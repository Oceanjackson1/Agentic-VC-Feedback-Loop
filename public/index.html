<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>投资人对话总结 Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fbfbfd;
      --bg-secondary: #f5f5f7;
      --surface: #ffffff;
      --surface-hover: #fafafa;
      --border: rgba(0, 0, 0, 0.08);
      --border-strong: rgba(0, 0, 0, 0.12);
      --text: #1d1d1f;
      --text-secondary: #6e6e73;
      --text-tertiary: #86868b;
      --accent: #0071e3;
      --accent-hover: #0077ed;
      --accent-light: rgba(0, 113, 227, 0.08);
      --success: #34c759;
      --success-light: rgba(52, 199, 89, 0.12);
      --error: #ff3b30;
      --error-light: rgba(255, 59, 48, 0.12);
      --radius: 12px;
      --radius-lg: 18px;
      --shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
      --shadow-hover: 0 4px 24px rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem 4rem;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    main {
      width: 100%;
      max-width: 520px;
    }

    .hero {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
      color: var(--text);
    }

    .subtitle {
      font-size: 1rem;
      color: var(--text-secondary);
      font-weight: 400;
      line-height: 1.5;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      margin-bottom: 1.25rem;
      overflow: hidden;
    }

    .upload-zone {
      padding: 2.5rem 2rem;
      text-align: center;
      cursor: pointer;
      position: relative;
      border: 2px dashed var(--border-strong);
      border-radius: var(--radius);
      margin: 1.25rem;
      background: var(--bg-secondary);
      transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .upload-zone:hover,
    .upload-zone.dragover {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 1rem;
      color: var(--text-tertiary);
    }

    .upload-zone:hover .upload-icon,
    .upload-zone.dragover .upload-icon {
      color: var(--accent);
    }

    .upload-zone p {
      color: var(--text-secondary);
      font-size: 0.9375rem;
    }

    .upload-zone p strong {
      color: var(--text);
      font-weight: 600;
    }

    .file-hint {
      font-size: 0.8125rem;
      margin-top: 0.375rem;
      color: var(--text-tertiary);
    }

    .selected-file {
      margin-top: 1rem;
      font-size: 0.8125rem;
      color: var(--accent);
      font-weight: 500;
    }

    .section-title {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 0.75rem;
      padding: 0 1.25rem;
      letter-spacing: 0.01em;
    }

    .lang-cards {
      display: flex;
      gap: 0.75rem;
      padding: 0 1.25rem 1.25rem;
    }

    .lang-card {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.125rem 1rem;
      background: var(--bg-secondary);
      border: 2px solid transparent;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s ease;
      min-height: 80px;
    }

    .lang-card:hover {
      background: var(--surface-hover);
    }

    .lang-card:has(input:checked) {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .lang-card input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .lang-card-label {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    .lang-card-desc {
      font-size: 0.75rem;
      color: var(--text-tertiary);
      margin-top: 0.25rem;
    }

    .btn-primary {
      width: 100%;
      padding: 1rem 1.5rem;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 1px 4px rgba(0, 113, 227, 0.25);
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(0, 113, 227, 0.3);
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .status {
      margin-top: 1.25rem;
      padding: 1rem 1.25rem;
      border-radius: var(--radius);
      font-size: 0.9375rem;
      display: none;
      font-weight: 500;
    }

    .status.error {
      display: block;
      background: var(--error-light);
      color: var(--error);
    }

    .status.success {
      display: block;
      background: var(--success-light);
      color: var(--success);
    }

    .status.loading {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--bg-secondary);
      color: var(--text-secondary);
    }

    .status.loading::before {
      content: "";
      width: 18px;
      height: 18px;
      border: 2px solid var(--border-strong);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <main>
    <div class="hero">
      <h1>投资人对话总结</h1>
      <p class="subtitle">上传对话记录，获取结构化分析与 Excel 导出</p>
    </div>

    <div class="card">
      <div class="upload-zone" id="zone">
        <input type="file" id="file" accept=".txt,.md,.pdf,.docx,.html,.htm" />
        <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="17 8 12 3 7 8" />
          <line x1="12" y1="3" x2="12" y2="15" />
        </svg>
        <p><strong>点击或拖拽文件到此处</strong></p>
        <p class="file-hint">支持 .txt .md .pdf .docx .html</p>
        <p class="selected-file" id="selected"></p>
      </div>

      <p class="section-title">输出语言</p>
      <div class="lang-cards">
        <label class="lang-card" data-lang="zh">
          <input type="radio" name="lang" value="zh" checked />
          <span class="lang-card-label">中文</span>
          <span class="lang-card-desc">导出中文 Excel</span>
        </label>
        <label class="lang-card" data-lang="en">
          <input type="radio" name="lang" value="en" />
          <span class="lang-card-label">English</span>
          <span class="lang-card-desc">Export English Excel</span>
        </label>
      </div>
    </div>

    <button class="btn-primary" id="submit" disabled>开始分析</button>

    <div class="status" id="status"></div>
  </main>

  <script>
    const zone = document.getElementById("zone");
    const fileInput = document.getElementById("file");
    const submitBtn = document.getElementById("submit");
    const statusEl = document.getElementById("status");
    const selectedEl = document.getElementById("selected");

    const API_BASE = window.location.origin;

    function setStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = "status " + type;
    }

    zone.addEventListener("dragover", (e) => {
      e.preventDefault();
      zone.classList.add("dragover");
    });
    zone.addEventListener("dragleave", () => zone.classList.remove("dragover"));
    zone.addEventListener("drop", (e) => {
      e.preventDefault();
      zone.classList.remove("dragover");
      const f = e.dataTransfer?.files?.[0];
      if (f) fileInput.files = e.dataTransfer.files;
      updateSubmitState();
    });

    const langRadios = document.querySelectorAll('input[name="lang"]');
    fileInput.addEventListener("change", updateSubmitState);
    langRadios.forEach(r => r.addEventListener("change", updateSubmitState));

    function updateSelected() {
      const f = fileInput.files?.[0];
      selectedEl.textContent = f ? `已选择: ${f.name}` : "";
    }

    function getSelectedLang() {
      const r = document.querySelector('input[name="lang"]:checked');
      return r ? r.value : null;
    }

    function updateSubmitState() {
      updateSelected();
      const f = fileInput.files?.[0];
      const lang = getSelectedLang();
      submitBtn.disabled = !f || !lang;
    }

    submitBtn.addEventListener("click", async () => {
      const f = fileInput.files?.[0];
      const lang = getSelectedLang();
      if (!f || !lang) return;

      submitBtn.disabled = true;
      setStatus(lang === "en" ? "正在分析并翻译，请稍候..." : "正在分析，请稍候...", "loading");

      const form = new FormData();
      form.append("file", f);
      form.append("language", lang);

      try {
        const res = await fetch(API_BASE + "/api/analyze", {
          method: "POST",
          body: form,
        });
        const blob = await res.blob();

        if (!res.ok) {
          const text = await blob.text();
          let msg = text;
          try {
            const j = JSON.parse(text);
            msg = j.detail || j.message || text;
          } catch (_) {}
          throw new Error(msg);
        }

        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        const baseName = (f.name.replace(/\.[^.]+$/, "") || "export");
        a.download = lang === "en" ? baseName + "_analysis_result.xlsx" : baseName + "_分析结果.xlsx";
        a.click();
        URL.revokeObjectURL(a.href);

        setStatus("分析完成，Excel 已下载", "success");
      } catch (e) {
        setStatus(e.message || "请求失败，请稍后重试", "error");
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
